environment:
  matrix:
    - nodejs_version: '22'
    - nodejs_version: '24'
install:
  - ps: Install-Product node $env:nodejs_version
  - npm i -g pnpm@latest-5
  - pnpm install
matrix:
  fast_finish: true
build: 'off'
version: '{build}'
test_script:
  - node --version
  - npm --version
  - npm test
